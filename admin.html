<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QassaPos — Админ панель</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F5F0; color: #1a1a1a; font-size: 14px; padding: 24px; }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 16px; }
  .key-box { background: #fff; border: 1px solid #E8E8E3; border-radius: 12px; padding: 16px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
  .key-box input { flex: 1; padding: 10px 12px; border: 1px solid #E0E0DB; border-radius: 8px; font-size: 13px; }
  .key-box label { font-size: 13px; font-weight: 500; color: #555; }
  .btn { padding: 9px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; font-weight: 500; }
  .btn-primary { background: #1D9E75; color: #fff; }
  .btn-primary:hover { background: #0F6E56; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn-danger { background: #FEE8E8; color: #C0392B; }
  .btn-green { background: #E8F7F1; color: #0F6E56; }
  .btn-amber { background: #FEF3C7; color: #92400E; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-bottom: 20px; }
  .metric { background: #fff; border: 1px solid #E8E8E3; border-radius: 10px; padding: 14px 16px; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 5px; }
  .metric-value { font-size: 24px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #E8E8E3; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: #999; padding: 12px 10px; border-bottom: 1px solid #E8E8E3; text-transform: uppercase; }
  td { padding: 12px 10px; border-bottom: 1px solid #F0F0EB; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFAFA; }
  .badge { display: inline-flex; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .badge-green { background: #E8F7F1; color: #0F6E56; }
  .badge-amber { background: #FEF3C7; color: #92400E; }
  .badge-red { background: #FEE8E8; color: #9B1C1C; }
  .badge-gray { background: #F0F0EB; color: #666; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .empty { text-align: center; padding: 40px; color: #bbb; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 22px; width: 320px; }
  .modal h3 { font-size: 16px; margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
  .field select, .field input { width: 100%; padding: 9px; border: 1px solid #E0E0DB; border-radius: 8px; font-size: 13px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; display: none; z-index: 999; }
</style>
</head>
<body>
<div class="container">
  <h1>🛠 QassaPos — Управление клиентами</h1>

  <div class="key-box">
    <label>ADMIN_KEY:</label>
    <input type="password" id="admin-key" placeholder="Введите секретный ключ из Railway Variables">
    <button class="btn btn-primary" onclick="loadAccounts()">Войти</button>
  </div>

  <div id="content" style="display:none;">
    <div class="metrics" id="metrics"></div>
    <table>
      <thead><tr><th>Заведение</th><th>Email</th><th>Тариф</th><th>Статус</th><th>Доступ до</th><th>Действия</th></tr></thead>
      <tbody id="accounts-tbody"></tbody>
    </table>
  </div>
  <div class="empty" id="empty-msg">Введите ADMIN_KEY чтобы увидеть список клиентов</div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-body"></div>
</div>
<div id="toast"></div>

<script>
const API_URL = 'https://qasspost-production.up.railway.app';
let adminKey = localStorage.getItem('qp_admin_key') || '';
let accounts = [];

document.getElementById('admin-key').value = adminKey;
if (adminKey) loadAccounts();

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 2500);
}

async function adminApi(path, opts = {}) {
  const res = await fetch(API_URL + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey, ...(opts.headers||{}) }
  });
  let data; try { data = await res.json(); } catch { data = {}; }
  if (!res.ok) throw new Error(data.error || 'Ошибка ' + res.status);
  return data;
}

async function loadAccounts() {
  adminKey = document.getElementById('admin-key').value.trim();
  if (!adminKey) return toast('Введите ключ');
  localStorage.setItem('qp_admin_key', adminKey);
  try {
    accounts = await adminApi('/admin/accounts');
    document.getElementById('content').style.display = 'block';
    document.getElementById('empty-msg').style.display = 'none';
    renderMetrics(); renderTable();
  } catch (err) {
    toast('Ошибка: ' + err.message);
    document.getElementById('content').style.display = 'none';
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('empty-msg').textContent = 'Ошибка: ' + err.message;
  }
}

function renderMetrics() {
  const total = accounts.length;
  const active = accounts.filter(a=>a.status==='active').length;
  const trial = accounts.filter(a=>a.status==='trial').length;
  const blocked = accounts.filter(a=>a.status==='blocked').length;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Всего клиентов</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Активных</div><div class="metric-value" style="color:#0F6E56">${active}</div></div>
    <div class="metric"><div class="metric-label">Пробный период</div><div class="metric-value" style="color:#B45309">${trial}</div></div>
    <div class="metric"><div class="metric-label">Заблокировано</div><div class="metric-value" style="color:#C0392B">${blocked}</div></div>`;
}

const statusBadge = { active:'badge-green', trial:'badge-amber', expired:'badge-red', blocked:'badge-gray' };
const statusLabel = { active:'Активна', trial:'Пробный период', expired:'Истекла', blocked:'Заблокирована' };
const planLabel = { start:'Старт', business:'Бизнес', network:'Сеть' };

function renderTable() {
  document.getElementById('accounts-tbody').innerHTML = accounts.map(a => {
    const expires = a.expires_at ? new Date(a.expires_at).toLocaleDateString('ru-RU') : '—';
    return `<tr>
      <td><strong>${a.venue_name || a.name}</strong></td>
      <td style="color:#888;">${a.email}</td>
      <td>${planLabel[a.plan]||a.plan}</td>
      <td><span class="badge ${statusBadge[a.status]||'badge-gray'}">${statusLabel[a.status]||a.status}</span></td>
      <td>${expires}</td>
      <td class="actions">
        <button class="btn btn-sm btn-primary" onclick="openActivate(${a.id})">Активировать</button>
        <button class="btn btn-sm btn-green" onclick="extend(${a.id})">+1 мес</button>
        ${a.status==='blocked'
          ? `<button class="btn btn-sm btn-green" onclick="unblock(${a.id})">Разблок.</button>`
          : `<button class="btn btn-sm btn-danger" onclick="block(${a.id})">Заблок.</button>`}
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="text-align:center;color:#bbb;padding:24px;">Клиентов пока нет</td></tr>';
}

function showModal(html) { document.getElementById('modal-body').innerHTML = html; document.getElementById('modal-bg').classList.add('open'); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

function openActivate(id) {
  showModal(`<h3>Активировать тариф</h3>
    <div class="field"><label>Тариф</label>
      <select id="act-plan">
        <option value="start">Старт ($29)</option>
        <option value="business" selected>Бизнес ($49)</option>
        <option value="network">Сеть ($89)</option>
      </select>
    </div>
    <div class="field"><label>Срок (месяцев)</label>
      <select id="act-months">
        <option value="1">1 месяц</option>
        <option value="3">3 месяца (-10%)</option>
        <option value="6">6 месяцев (-15%)</option>
        <option value="12">12 месяцев (-20%)</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeModal()">Отмена</button>
      <button class="btn btn-sm btn-primary" onclick="doActivate(${id})">Активировать</button>
    </div>`);
}
async function doActivate(id) {
  const plan = document.getElementById('act-plan').value;
  const months = +document.getElementById('act-months').value;
  try {
    await adminApi(`/admin/accounts/${id}/activate`, { method:'POST', body: JSON.stringify({ plan, months }) });
    toast('Активировано!'); closeModal(); loadAccounts();
  } catch(err) { toast(err.message); }
}
async function extend(id) {
  try {
    await adminApi(`/admin/accounts/${id}/extend`, { method:'POST', body: JSON.stringify({ months: 1 }) });
    toast('Продлено на 1 месяц'); loadAccounts();
  } catch(err) { toast(err.message); }
}
async function block(id) {
  if (!confirm('Заблокировать этот аккаунт?')) return;
  try { await adminApi(`/admin/accounts/${id}/block`, { method:'POST' }); toast('Заблокирован'); loadAccounts(); }
  catch(err) { toast(err.message); }
}
async function unblock(id) {
  try { await adminApi(`/admin/accounts/${id}/unblock`, { method:'POST' }); toast('Разблокирован'); loadAccounts(); }
  catch(err) { toast(err.message); }
}
</script>
</body>
</html>
